<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports App</title>

    <style>
        table, tr, td, th {
            border: 1px solid gray;
        }
        .output {
            width: 80em;
            height: 10em;
        }
        .highlight {
            border: 2px solid lightgreen;
        }
        .error {
            border-color: red;
        }
    </style>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script>
        $(document).ready(function(){
            $(document).on('submit', 'form', function(event){
                var $form = $(this);
                var $outputBox = $(this).siblings('.output');

                $.ajax({
                    url: 'api.php',
                    data: $form.serialize(),
                    method: 'post',
                    success: function(data){
                        console.log(data);

                        if(!data.success){
                            $outputBox.addClass('error');
                        } else if (data.success && $form.find("input[name='action']").val() === 'signIn') {
                            window.location.href = "home.html"; // Change to home page if log in true
                        }
                    },
                    error: function(jqXHR, status, error){
                        $outputBox.html(error);
                        $outputBox.addClass('highlight').addClass('error');
                    }, 
                });

                // Remove highlighting during request.
                $('.highlight').removeClass('highlight').removeClass('error');

                event.preventDefault();
                return false;
            });
        });
    </script>

</head>
<body>

    <div class="action-wrapper">
        <h1>Sign up</h1>
        <form>
            <input type="hidden" name="action" value="addUser"/>
            Username: <input type="text" name="username"/><br/>
            Password: <input type="password" name="password"/><br/>
            <input type="submit" value="Add user"/>
        </form>
        <textarea class="output"></textarea>
    </div>

    <div class="action-wrapper">
        <h1>Sign in</h1>
        <form>
            <input type="hidden" name="action" value="signIn"/>
            Username: <input type="text" name="username"/><br/>
            Password: <input type="password" name="password"/><br/>
            <input type="submit" value="Sign in"/>
        </form>
        <textarea class="output"></textarea>
    </div>

</body>
</html>
